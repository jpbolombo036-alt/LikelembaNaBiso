version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: likelamba-db
    restart: always
    environment:
      POSTGRES_DB: likelamba
      POSTGRES_USER: likelamba
      POSTGRES_PASSWORD: likelamba
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: likelamba-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/likelamba
      - SPRING_DATASOURCE_USERNAME=likelamba
      - SPRING_DATASOURCE_PASSWORD=likelamba
      - JWT_SECRET=change_me_to_a_secure_base64_256bit_key
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./uploads:/app/uploads

volumes:
  uploads:
