spring:
  application:
    name: likelamba
  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/likelamba}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:likelamba}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:likelamba}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:${PORT:8080}}

app:
  cors:
    # Origines autorisees (sep par virgules). Remplacable via CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
  jwt:
    # Secret base64 >= 256 bits. A REMPLACER en production via JWT_SECRET.
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
