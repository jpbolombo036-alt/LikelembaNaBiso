[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/auth/status"
healthcheckTimeout = 180
healthcheckInterval = 10

# Railway Volume: persistent storage for uploaded files (preuves de paiement, etc.)
# Create this volume in the Railway dashboard:
#   1. Go to your service -> Settings -> Volumes
#   2. Add a volume with mount path: /app/uploads
# This ensures uploaded files survive container restarts.
